services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "12501:5432"
    environment:
      POSTGRES_USER: kunci
      POSTGRES_PASSWORD: kunci_dev
      POSTGRES_DB: kunci_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kunci"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "27096:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
