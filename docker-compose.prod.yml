# KUNCI Production Stack
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Required: Create .env.production with all secrets before deploying.
# See .env.example for the full list of variables.

services:
  # ── Application ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://kunci:${POSTGRES_PASSWORD}@postgres:5432/kunci
      REDIS_URL: redis://redis:6379
      WEB_DIST_PATH: /app/apps/web/dist
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Security: read-only root filesystem
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    # Security: drop all capabilities, add only what's needed
    cap_drop:
      - ALL
    # Security: prevent privilege escalation
    security_opt:
      - no-new-privileges:true
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    # Security: no port exposure to host in production
    # Uncomment below ONLY if you need external DB access:
    # ports:
    #   - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: kunci
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_USE_A_STRONG_PASSWORD}
      POSTGRES_DB: kunci
      # Security: disable trust authentication
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Security: read-only root filesystem
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
      - /run/postgresql:size=16m
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kunci -d kunci"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    shm_size: 128mb

  # ── Cache ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Security: no port exposure to host
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --protected-mode yes
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
      --rename-command CONFIG ""
    volumes:
      - redisdata:/data
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
